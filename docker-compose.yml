services:
  django:
    build: .
    command: sh -c "python manage.py migrate && python manage.py seed_demo && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: local-compose-dev-key
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1,django
      DATABASE_URL: sqlite:////data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      TRADING_MODE: paper
      LIVE_TRADING_ENABLED: "false"
      LIVE_TRADING_ARMED: "false"
    ports:
      - "8000:8000"
    volumes:
      - app-data:/data
    depends_on:
      - redis

  fastapi:
    build: .
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8001
    environment:
      DJANGO_SECRET_KEY: local-compose-dev-key
      DEBUG: "true"
      DATABASE_URL: sqlite:////data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      TRADING_MODE: paper
      LIVE_TRADING_ENABLED: "false"
      LIVE_TRADING_ARMED: "false"
    ports:
      - "8001:8001"
    volumes:
      - app-data:/data
    depends_on:
      - django
      - redis

  celery-worker:
    build: .
    command: celery -A ai_live_trading_bot worker -l info
    environment:
      DJANGO_SECRET_KEY: local-compose-dev-key
      DEBUG: "true"
      DATABASE_URL: sqlite:////data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      TRADING_MODE: paper
      LIVE_TRADING_ENABLED: "false"
      LIVE_TRADING_ARMED: "false"
    volumes:
      - app-data:/data
    depends_on:
      - django
      - redis

  celery-beat:
    build: .
    command: celery -A ai_live_trading_bot beat -l info
    environment:
      DJANGO_SECRET_KEY: local-compose-dev-key
      DEBUG: "true"
      DATABASE_URL: sqlite:////data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
      TRADING_MODE: paper
      LIVE_TRADING_ENABLED: "false"
      LIVE_TRADING_ARMED: "false"
    volumes:
      - app-data:/data
    depends_on:
      - django
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: trading_bot
      POSTGRES_PASSWORD: trading_bot_local_only
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  app-data:
  redis-data:
  postgres-data:
