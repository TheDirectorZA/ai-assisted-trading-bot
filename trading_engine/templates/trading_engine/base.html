<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:"AI Live Trading Bot" }}</title>
  <style>
    :root { color-scheme: light; --ink:#17212b; --muted:#65758b; --line:#d7dee8; --bg:#f7f9fb; --panel:#fff; --danger:#9f1239; --ok:#047857; --warn:#a16207; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; color:var(--ink); background:var(--bg); }
    header { background:#111827; color:#fff; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; gap:20px; }
    header a { color:#fff; text-decoration:none; margin-right:12px; font-size:14px; }
    main { padding:22px; max-width:1280px; margin:0 auto; }
    h1 { font-size:26px; margin:0 0 16px; }
    h2 { font-size:18px; margin:0 0 10px; }
    table { width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); }
    th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { background:#eef3f8; font-size:13px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:14px; }
    .panel { background:var(--panel); border:1px solid var(--line); padding:16px; border-radius:6px; }
    .banner { padding:12px 16px; border-radius:6px; margin-bottom:16px; font-weight:700; }
    .danger { background:#ffe4e6; color:var(--danger); border:1px solid #fecdd3; }
    .ok { background:#dcfce7; color:var(--ok); border:1px solid #bbf7d0; }
    .warn { background:#fef3c7; color:var(--warn); border:1px solid #fde68a; }
    button { border:0; border-radius:6px; padding:10px 14px; font-weight:700; cursor:pointer; }
    .danger-button { background:var(--danger); color:white; }
    .muted { color:var(--muted); }
    code { background:#eef3f8; padding:2px 5px; border-radius:4px; }
  </style>
</head>
<body>
  <header>
    <strong>AI Live Trading Bot</strong>
    <nav>
      <a href="{% url 'trading_engine:dashboard' %}">Dashboard</a>
      <a href="{% url 'trading_engine:broker_connection' %}">Broker</a>
      <a href="{% url 'trading_engine:live_controls' %}">Live Controls</a>
      <a href="{% url 'trading_engine:symbols' %}">Symbols</a>
      <a href="{% url 'trading_engine:strategies' %}">Strategies</a>
      <a href="{% url 'trading_engine:risk_events' %}">Risk</a>
      <a href="{% url 'trading_engine:audit_logs' %}">Audit</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
